<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minha GitHub Page</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      line-height: 1.5;
    }

    .card {
      border: 1px solid #ccc;
      border-radius: 10px;
      padding: 20px;
      max-width: 700px;
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-top: 12px;
      font-weight: bold;
    }

    input, textarea, select, button {
      width: 100%;
      padding: 10px;
      margin-top: 6px;
      box-sizing: border-box;
    }

    img {
      max-width: 100%;
      border-radius: 8px;
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <h1>Exemplo GitHub Pages</h1>

  <div class="card">
    <h2>Imagem</h2>
    <img src="images/azure-architecture.png" alt="Arquitetura Azure" />
  </div>

  <div class="card">
    <h2>Formulário</h2>

    <label for="nome">Nome</label>
    <input type="text" id="nome" placeholder="Escreve o teu nome" />

    <label for="descricao">Descrição</label>
    <textarea id="descricao" rows="4" placeholder="Escreve aqui"></textarea>

    <label for="ambiente">Ambiente</label>
    <select id="ambiente">
      <option value="">Seleciona</option>
      <option>Dev</option>
      <option>Test</option>
      <option>Prod</option>
    </select>

    <label for="ferramenta">Ferramenta</label>
    <input list="ferramentas" id="ferramenta" placeholder="Escolhe ou escreve" />
    <datalist id="ferramentas">
      <option value="Terraform">
      <option value="PowerShell">
      <option value="Azure CLI">
      <option value="GitHub Actions">
    </datalist>

    <button onclick="mostrarResumo()">Mostrar resumo</button>
  </div>

  <div class="card">
    <h2>Resultado</h2>
    <p id="resultado">Ainda sem dados.</p>
  </div>

  <script>
    function mostrarResumo() {
      const nome = document.getElementById("nome").value;
      const descricao = document.getElementById("descricao").value;
      const ambiente = document.getElementById("ambiente").value;
      const ferramenta = document.getElementById("ferramenta").value;

      document.getElementById("resultado").innerText =
        `Nome: ${nome || "-"} | Ambiente: ${ambiente || "-"} | Ferramenta: ${ferramenta || "-"} | Descrição: ${descricao || "-"}`;
    }
  </script>

</body>
</html>
